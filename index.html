<title>XE Servicio Electrónico - Cotizador Premium</title>

<style>
:root {
    --bg-main: #06070b;
    --bg-card: rgba(13, 15, 22, 0.75);
    --border-glass: rgba(255, 255, 255, 0.05);
    --blue-metallic: #0072ff;
    --cyan-accent: #00f2fe;
    --text-primary: #e2e8f0;
    --text-muted: #707e94;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0b1528 0%, #06070b 60%);
    background-attachment: fixed;
    color: var(--text-primary);
    padding: 0;
    overflow-x: hidden;
}

/* 1. BARRA SUPERIOR DE BENEFICIOS */
.top-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    background: rgba(6, 7, 11, 0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-glass);
    padding: 14px 20px;
}

.top-bar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 500;
}

.top-bar-item svg {
    width: 16px;
    height: 16px;
    color: var(--cyan-accent);
}

/* CONTENEDOR PRINCIPAL */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 40px 20px;
}

/* 2. ENCABEZADO CON LOGO CENTRADO */
.header-brand {
    text-align: center;
    margin-bottom: 40px;
}

.logo-img {
    width: 120px;
    height: auto;
    filter: drop-shadow(0 4px 15px rgba(0, 114, 255, 0.2));
    animation: floatLogo 4s ease-in-out infinite alternate;
}

@keyframes floatLogo {
    from { transform: translateY(0); }
    to { transform: translateY(-6px); }
}

.main-title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin: 20px 0 6px 0;
    background: linear-gradient(180deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.main-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin: 0;
    font-weight: 300;
}

/* 3. DISEÑO DE DOS COLUMNAS (Estilo App de Consolas) */
.layout-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 30px;
    align-items: start;
}

/* CONTENEDOR DE LA IMAGEN DE CONSOLA (RESPLANDOR CONTROLADO) */
.console-display-panel {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-glass);
    border-radius: 24px;
    padding: 30px;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

/* El marco tecnológico que rodea la consola */
.console-glow-frame {
    margin: 20px auto;
    width: 100%;
    max-width: 340px;
    height: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 24px;
    background: radial-gradient(circle, rgba(0, 242, 254, 0.08) 0%, rgba(0,0,0,0) 70%);
    border: 1px solid rgba(0, 242, 254, 0.15);
    box-shadow: 0 0 30px rgba(0, 242, 254, 0.05);
    position: relative;
    transition: all 0.5s ease;
}

.console-glow-frame img {
    max-width: 80%;
    max-height: 80%;
    object-fit: contain;
    filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.console-display-panel:hover .console-glow-frame {
    border-color: rgba(0, 242, 254, 0.3);
    box-shadow: 0 0 40px rgba(0, 242, 254, 0.12);
}

.console-display-panel:hover .console-glow-frame img {
    transform: scale(1.05);
}

/* ELEMENTOS DE FORMULARIO DE ALTA GAMA */
.form-group {
    margin-bottom: 22px;
}

label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--cyan-accent);
    margin-bottom: 8px;
    font-weight: 600;
}

label svg {
    width: 14px;
    height: 14px;
}

select, input, textarea {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: #0d0f16;
    color: #ffffff;
    font-size: 14px;
    font-family: inherit;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

select:hover, input:hover, textarea:hover {
    border-color: rgba(0, 114, 255, 0.4);
}

select:focus, input:focus, textarea:focus {
    outline: none;
    border-color: var(--blue-metallic);
    background: #121520;
    box-shadow: 0 0 0 3px rgba(0, 114, 255, 0.15);
}

/* 4. TARJETA DE PRECIO DESTACADA */
.price-showcase-box {
    background: linear-gradient(135deg, rgba(0, 114, 255, 0.1) 0%, rgba(0, 242, 254, 0.05) 100%);
    border: 1px solid rgba(0, 242, 254, 0.2);
    border-radius: 16px;
    padding: 20px;
    margin-top: 25px;
}

.price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 10px;
}

.price-row span {
    color: #ffffff;
    font-weight: 500;
}

.total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
}

.total-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #ffffff;
}

.total-amount {
    font-size: 32px;
    font-weight: 700;
    color: var(--cyan-accent);
}

/* 5. BOTONES MODERNOS INTERACTIVOS */
button, .action-link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 14px;
    transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    box-sizing: border-box;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-decoration: none;
}

.wa-btn {
    background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%);
    color: white;
}

.wa-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 114, 255, 0.4);
}

.pay-btn {
    background: #121520;
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.15);
}

.pay-btn:hover {
    border-color: var(--cyan-accent);
    background: #171b29;
    transform: translateY(-2px);
}

.secondary-link {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.06);
    color: var(--text-muted);
}

.secondary-link:hover {
    border-color: rgba(255, 255, 255, 0.2);
    color: #ffffff;
    transform: translateY(-1px);
}

/* SECCIONES COMPLEMENTARIAS (OPINIONES Y PAGOS) */
.card-secondary {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-glass);
    padding: 30px;
    border-radius: 24px;
    margin-top: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #ffffff;
    margin-top: 0;
    margin-bottom: 20px;
}

.section-title svg {
    width: 20px;
    height: 20px;
    color: var(--blue-metallic);
}

.payment-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.payment-method {
    background: #0d0f16;
    border: 1px solid rgba(255, 255, 255, 0.04);
    padding: 20px;
    border-radius: 16px;
}

.payment-method h4 {
    margin: 0 0 8px 0;
    color: var(--cyan-accent);
    font-size: 14px;
}

.payment-method p {
    margin: 4px 0;
    font-size: 13px;
    color: var(--text-muted);
}

.payment-method .account-number {
    font-size: 15px;
    color: #ffffff;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin: 8px 0;
}

/* SISTEMA DE OPINIONES MEJORADO */
.star-rating-area {
    display: flex;
    gap: 6px;
    margin: 12px 0;
}

.star-rating-area span {
    font-size: 24px;
    cursor: pointer;
    color: #1e293b;
    transition: color 0.2s ease;
}

.star-rating-area span.active, .star-rating-area span:hover {
    color: #eab308;
}

.reviews-scroll-container {
    max-height: 220px;
    overflow-y: auto;
    margin-top: 20px;
}

.reviews-scroll-container::-webkit-scrollbar {
    width: 4px;
}

.reviews-scroll-container::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
}

.single-review-card {
    background: rgba(255,255,255,0.02);
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 12px;
    border-left: 3px solid var(--blue-metallic);
}

/* RESPONSIVE DESIGN */
@media(max-width: 900px) {
    .layout-grid {
        grid-template-columns: 1fr;
    }
    .top-bar {
        display: none; /* Se ocultan los textos de la topbar en móviles pequeños para limpieza */
    }
}
</style>
</head>
