<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XE Servicio Electrónico</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Roboto,Arial,sans-serif;
background:#060608; /* Negro Absoluto Mate */
color:#e2e8f0; /* Blanco Platino */
padding:20px;
overflow-x:hidden;
}

.container{
max-width:800px;
margin:auto;
position:relative;
padding:20px 10px;
}

/* LOGO ÍCONO XE */
.logo{
text-align:center;
padding:10px 0 30px 0;
}

.logo-img{ 
width:160px; 
display:block; 
margin:auto; 
filter:drop-shadow(0 6px 15px rgba(0,0,0,0.7));
animation:logoFloat 4s ease-in-out infinite alternate; 
} 

@keyframes logoFloat{ 
from{ transform:translateY(0); } 
to{ transform:translateY(-8px); } 
} 

.subtitulo{ 
margin-top:15px; 
color:#94a3b8; /* Gris Plata Atenuado */
font-size: 15px;
letter-spacing: 2px;
margin-bottom:20px; 
font-weight: 400;
text-transform: uppercase;
} 

/* CONTENEDOR DE CONSOLA CON RESPLANDOR CIAN SUTIL */
.console-box{ 
display:flex; 
justify-content:center; 
margin:25px auto; 
background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, rgba(0,0,0,0) 70%);
padding: 20px;
border-radius: 50%;
width: 280px;
height: 280px;
align-items: center;
box-shadow: 0 0 40px rgba(0, 242, 254, 0.08);
transition: all 0.5s ease;
} 

.console-box img{ 
width:230px; 
max-width:100%; 
transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
} 

.console-box:hover {
box-shadow: 0 0 50px rgba(0, 242, 254, 0.22);
background: radial-gradient(circle, rgba(0, 242, 254, 0.22) 0%, rgba(0,0,0,0) 70%);
}

.console-box:hover img {
transform: scale(1.06);
}

/* CARD PREMIUM (GLASSMORPHISM NEGRO METÁLICO) */
.card{
background: linear-gradient(135deg, rgba(20, 20, 25, 0.9) 0%, rgba(10, 10, 12, 0.95) 100%);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(212, 175, 55, 0.12); /* Borde sutil Oro */
padding: 30px;
margin: 25px 0;
border-radius: 18px;
box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
}

/* FORMULARIOS */
label {
display: block;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 2px;
color: #d4af37; /* Oro Premium para Etiquetas */
margin-top: 20px;
margin-bottom: 6px;
font-weight: 600;
}

select, input, textarea {
width: 100%;
padding: 14px;
margin: 4px 0 12px 0;
border-radius: 8px;
border: 1px solid rgba(255, 255, 255, 0.08);
background: #111114; /* Negro Metálico */
color: #f1f5f9; /* Blanco Plata */
font-size: 15px;
box-sizing: border-box;
transition: all 0.3s ease;
}

select:hover, input:hover, textarea:hover {
border-color: rgba(214, 219, 225, 0.3); /* Plata */
}

select:focus, input:focus, textarea:focus {
outline: none;
border-color: #d4af37; /* Foco en Oro */
background: #141419;
box-shadow: 0 0 0 3px rgba(214, 175, 55, 0.15);
}

/* BOTONES ESTILO LUJO */
button {
width: 100%;
padding: 16px;
border: none;
border-radius: 8px;
font-weight: 600;
font-size: 15px;
cursor: pointer;
margin-top: 14px;
transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
box-sizing: border-box;
text-transform: uppercase;
letter-spacing: 1px;
}

/* Oro Líquido / Metálico */
.wa {
background: linear-gradient(135deg, #c5a028 0%, #9a7b1c 100%);
color: #000000; /* Texto negro para contraste elegante */
box-shadow: 0 4px 15px rgba(154, 123, 28, 0.25);
}

.wa:hover {
background: linear-gradient(135deg, #d4af37 0%, #b28d22 100%);
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
}

/* Negro Metálico Pulido */
.pay {
background: linear-gradient(135deg, #1e1e24 0%, #111115 100%);
color: #e2e8f0; /* Texto Plata */
border: 1px solid rgba(255, 255, 255, 0.15);
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
}

.pay:hover {
border-color: #ffffff;
background: linear-gradient(135deg, #25252c 0%, #16161c 100%);
transform: translateY(-2px);
}

/* Links secundarios en Plata Platino */
.link {
background: transparent;
border: 1px solid rgba(255, 255, 255, 0.1);
color: #94a3b8;
}

.link:hover {
background: rgba(255, 255, 255, 0.03);
border-color: #d4af37; /* Cambio sutil a oro al pasar el cursor */
color: #ffffff;
transform: translateY(-2px);
}

button:active {
transform: translateY(0);
}

/* RESULTADOS MÍNIMALISTAS */
.result {
background: #09090b;
padding: 20px;
border-radius: 10px;
border: 1px solid rgba(255, 255, 255, 0.03);
margin-top: 25px;
margin-bottom: 10px;
}

.result span {
font-weight: 600;
color: #ffffff;
}

.total {
font-size: 24px;
font-weight: 700;
color: #00f2fe !important; /* Acento Cian estrictamente aquí */
margin-top: 12px;
padding-top: 12px;
border-top: 1px solid rgba(255, 255, 255, 0.06);
letter-spacing: 0.5px;
}

.total span {
color: #00f2fe !important;
}

/* SECCIÓN DE PAGOS */
.paybox {
background: rgba(15, 15, 18, 0.8);
backdrop-filter: blur(10px);
border: 1px solid rgba(212, 175, 55, 0.08);
padding: 25px;
border-radius: 16px;
margin-top: 25px;
}

.paybox h3 {
color: #d4af37; /* Oro */
font-size: 16px;
margin-top: 0;
margin-bottom: 20px;
font-weight: 600;
letter-spacing: 1.5px;
text-transform: uppercase;
}

.paybox p {
margin: 6px 0;
color: #cbd5e1; /* Plata */
font-size: 15px;
}

.paybox p strong {
color: #ffffff;
font-weight: 600;
}

.paybox hr {
border: 0;
height: 1px;
background: rgba(255, 255, 255, 0.06);
margin: 20px 0;
}

/* RESPONSIVO */
@media(max-width: 600px){
body {
padding: 10px;
}
.card {
padding: 20px;
}
.console-box {
width: 220px;
height: 220px;
}
.console-box img {
width: 170px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="logo"> 
<img src="logo.png" class="logo-img"> 
<p class="subtitulo">Especialistas en reparación de consolas</p> 
<div class="console-box"> 
<img id="consoleImg" src="xbox-one.png"> 
</div> 
</div>

<div class="card">

<label>Consola</label>
<select id="consola" onchange="loadServices()"></select>

<label>Servicio</label>
<select id="servicio" onchange="calc()"></select>

<label>Cliente</label>
<input id="cliente" placeholder="Tu nombre">

<label>Describe tu falla</label>
<textarea id="obs" rows="3" placeholder="Detalles de la falla de tu consola..."></textarea>

<div class="result">
💰 Precio: <span id="precio">$0</span><br style="content: ''; margin-bottom: 6px; display: block;">
⏱ Tiempo: <span id="tiempo">-</span><br>
<div class="total">TOTAL: <span id="total">$0</span></div>
</div>

<button class="wa" onclick="sendWA()">📲 WhatsApp</button>
<button class="pay" onclick="agendar()">💳 Anticipo y agendar</button>

<button class="link" onclick="window.open('https://deathmaskxe.github.io/CotizadorXE/')">
🕹 Cotizador de Controles
</button>

<button class="link" onclick="window.open('https://deathmaskxe.github.io/Tester-de-funcionalidad-controles/')">
🎮 Tester de Controles
</button>

</div>

<div class="paybox">

<h3>💳 Datos de pago</h3>

<p>🏦 <strong>Banorte</strong></p>
<p style="letter-spacing: 1px;">4189 1400 1021 7767</p>
<p style="color: #94a3b8; font-size: 13px;">Irving Daniel Sánchez</p>

<hr>

<p>💼 <strong>MercadoPago</strong></p>
<p style="letter-spacing: 1px;">722969020089368829</p>
<p style="color: #94a3b8; font-size: 13px;">Irving Daniel Sánchez Nava</p>

<hr>

<p style="color:#00f2fe; font-weight: 500; font-size: 14px; text-align: center; margin-bottom: 0;">
Envía comprobante por WhatsApp para confirmar cita
</p>

</div>

</div>

<script>

const data = {

"Xbox One":[
["Revisión / Diagnóstico",200,"1 a 2 días"],
["Mantenimiento",600,"1 Hora"],
["Cambio ventilador",400,"15 Min"],
["Cambio módulo inalámbrico",400,"15 Min"],
["Panel frontal",600,"15 Min"],
["MOSFET",900,"1 Hora"],
["Realtek",900,"40 Min"],
["Filtros o ESD",900,"1 Hora"],
["HDMI",900,"1 Hora"],
["IC Power",1000,"1 Hora"]
],

"Xbox One S":[
["Revisión / Diagnóstico",200,"1 a 2 días"],
["Mantenimiento",600,"1 Hora"],
["Ventilador",500,"15 Min"],
["Módulo inalámbrico",500,"15 Min"],
["Panel frontal",600,"15 Min"],
["MOSFET",1000,"1 Hora"],
["Realtek",1000,"40 Min"],
["Filtros",600,"1 Hora"],
["ESD",1200,"1 Hora"],
["HDMI",1000,"1 Hora"],
["IC Power",1200,"1 Hora"],
["Retimer",1000,"1 Hora"],
["Carcasa",800,"30 Min"]
],

"Xbox Series S":[
["Revisión / Diagnóstico",200,"1 a 2 días"],
["Mantenimiento",1200,"1 Hora"],
["HDMI",1300,"1 Hora"],
["Bluetooth",800,"10 Min"],
["WiFi",900,"10 Min"],
["Retimer",1500,"1 Hora"],
["ESD",1800,"4 Hrs"],
["SSD",2300,"2 Hrs"],
["Ethernet",1200,"1 Hora"],
["RAM/APU",2000,"2 Hrs"],
["MOSFET",1500,"2 Hrs"],
["Fuente",900,"3 Hrs"],
["Cambio fuente",1200,"20 Min"],
["Ventilador",1000,"10 Min"]
],

"Xbox Series X":[
["Revisión / Diagnóstico",200,"1 a 2 días"],
["Mantenimiento",1500,"1 Hora"],
["HDMI",1500,"1 Hora"],
["Bluetooth",1000,"10 Min"],
["WiFi",1000,"10 Min"],
["Retimer",1800,"1 Hora"],
["ESD",2200,"5 Hrs"],
["SSD",5000,"2 Hrs"],
["Ethernet",1500,"1 Hora"],
["RAM/APU",2600,"2 Hrs"],
["MOSFET",1800,"2 Hrs"],
["Fuente",1200,"3 Hrs"],
["Cambio fuente",1500,"20 Min"],
["Ventilador",1400,"10 Min"]
],

"PS4":[
["Revisión / Diagnóstico",200,"1 a 2 días"],
["Mantenimiento",700,"1 Hora"],
["Disco 1TB",2000,"1 Hora"],
["Disco 500GB",1600,"1 Hora"],
["HDMI",1000,"1 Hora"],
["Encoder",1100,"1 Hora"],
["Lectora",1000,"2 Hrs"]
],

"PS4 Pro":[
["Revisión / Diagnóstico",200,"1 a 2 días"],
["Mantenimiento",900,"1 Hora"],
["Disco 1TB",2000,"1 Hora"],
["Disco 500GB",1600,"1 Hora"],
["HDMI",1000,"1 Hora"],
["Encoder",1100,"1 Hora"],
["Lectora",1200,"2 Hrs"]
],

"PS5":[
["Revisión / Diagnóstico",200,"1 a 2 días"],
["Mantenimiento",1500,"1 Hora"],
["SSD chipset",2400,"1 Hora"],
["HDMI",1500,"1 Hora"],
["Encoder",1500,"1 Hora"],
["Fuente",1200,"2 Hrs"],
["Cambio fuente",1800,"30 Min"],
["Southbridge",2500,"3 Hrs"],
["BIOS",2000,"3 Hrs"],
["IC/Fusible",2000,"4 Hrs"]
],

"Nintendo Switch":[
["Revisión / Diagnóstico",200,"1 a 2 días"],
["Mantenimiento",500,"1 Hora"],
["Puerto de Carga Type-C",700,"1 Hora"],
["Chip de Video M92T36",900,"1 Hora"],
["IC de Carga BQ24193",900,"1 Hora"],
["Pantalla / Touch",1200,"2 Hrs"],
["Lector de Juegos",600,"30 Min"],
["Batería",600,"20 Min"]
]

};

const imagenes = {
"Xbox One":"xbox-one.png",
"Xbox One S":"xbox-one-s.png",
"Xbox Series S":"xbox-series-s.png",
"Xbox Series X":"xbox-series-x.png",
"PS4":"ps4.png",
"PS4 Pro":"ps4-pro.png",
"PS5":"ps5.png",
"Nintendo Switch":"switch.png"
}; 

let c=document.getElementById("consola");
let s=document.getElementById("servicio");

Object.keys(data).forEach(x=>{
let o=document.createElement("option");
o.value=x;
o.textContent=x;
c.appendChild(o);
});

loadServices();

function loadServices(){
document.getElementById("consoleImg").src=imagenes[c.value]; 
s.innerHTML="";
data[c.value].forEach(x=>{
let o=document.createElement("option");
o.value=x[0];
o.textContent=x[0];
s.appendChild(o);
});
calc();
}

function calc(){
let d=data[c.value].find(x=>x[0]===s.value);
if(d){
precio.innerText="$"+d[1];
tiempo.innerText=d[2];
total.innerText="$"+d[1];
}
}

function sendWA(){
let msg=`🎮 XE SERVICIO ELECTRÓNICO

👤 ${cliente.value}
🕹 ${c.value}
🔧 ${s.value}

💰 ${total.innerText}
⏱ ${tiempo.innerText}

📝 ${obs.value}`;

window.open("https://wa.me/527471731852?text="+encodeURIComponent(msg));
}

function agendar(){
let msg=`💳 XE SERVICIO ELECTRÓNICO

📅 AGENDAR REPARACIÓN

👤 ${cliente.value}
🕹 ${c.value}
🔧 ${s.value}

💰 ${total.innerText}
💳 Anticipo $200

🏦 Banorte / MercadoPago
Enviar comprobante`;

window.open("https://wa.me/527471731852?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
